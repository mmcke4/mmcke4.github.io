name: Update Hours Cache

on:
  schedule:
    - cron: '0 11 * * *'   # 6:00 AM EST (UTC-5) daily
  workflow_dispatch:         # allow manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch hours from Google Places API
        run: node scripts/fetch-hours.js
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Commit updated cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/hours-cache.json
          git diff --staged --quiet || git commit -m "chore: update hours cache [skip ci]"
          git push